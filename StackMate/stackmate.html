<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>StackMate</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#f5f2eb;--bg2:#edeae0;--ink:#1a1a18;--ink2:#4a4a44;--ink3:#8a8a80;--accent:#d4522a;--accent2:#2a6b4a;--accent3:#e8c547;--card:#ffffff;--border:#d8d4c8;--radius:16px;--font-display:'Syne',sans-serif;--font-body:'DM Sans',sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}
.navbar{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1.5px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:60px}
.navbar-logo{font-family:var(--font-display);font-weight:800;font-size:1.3rem;color:var(--ink);cursor:pointer;letter-spacing:-0.5px;display:flex;align-items:center;gap:6px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);display:inline-block}
.navbar-links{display:flex;gap:4px}
.nav-link{font-size:0.9rem;font-weight:400;color:var(--ink2);cursor:pointer;padding:6px 14px;border-radius:8px;border:none;background:transparent;transition:all 0.2s;font-family:var(--font-body)}
.nav-link:hover{background:var(--bg2);color:var(--ink)}
.nav-link.active{background:var(--ink);color:var(--bg);font-weight:500}
.page{max-width:1100px;margin:0 auto;padding:3rem 2rem 6rem}
.hero{display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:center;min-height:78vh;padding-top:1rem}
.hero-tag{display:inline-flex;align-items:center;gap:6px;background:var(--accent3);color:var(--ink);font-size:0.75rem;font-weight:600;padding:4px 12px;border-radius:100px;margin-bottom:1.4rem;letter-spacing:0.05em;text-transform:uppercase}
.hero-title{font-family:var(--font-display);font-size:clamp(2.4rem,5vw,3.8rem);font-weight:800;line-height:1.07;letter-spacing:-1.5px;margin-bottom:1.2rem}
.hero-title span{color:var(--accent);position:relative;display:inline-block}
.hero-title span::after{content:'';position:absolute;bottom:2px;left:0;width:100%;height:3px;background:var(--accent3);border-radius:2px}
.hero-sub{font-size:1.05rem;color:var(--ink2);line-height:1.7;margin-bottom:2rem;font-weight:300;max-width:440px}
.hero-actions{display:flex;gap:12px;flex-wrap:wrap}
.btn-primary{background:var(--ink);color:var(--bg);font-family:var(--font-body);font-size:0.95rem;font-weight:500;padding:12px 24px;border-radius:10px;border:none;cursor:pointer;transition:all 0.2s}
.btn-primary:hover{background:var(--accent);transform:translateY(-1px)}
.btn-secondary{background:transparent;color:var(--ink);font-family:var(--font-body);font-size:0.95rem;padding:12px 24px;border-radius:10px;border:1.5px solid var(--border);cursor:pointer;transition:all 0.2s}
.btn-secondary:hover{border-color:var(--ink);background:var(--bg2)}
.hero-right{display:flex;flex-direction:column;gap:12px}
.match-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:1rem 1.2rem;display:flex;align-items:center;gap:12px;transition:transform 0.2s}
.match-card:hover{transform:translateX(4px)}
.match-card.featured{border-color:var(--accent);background:#fff8f5}
.match-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:0.85rem;flex-shrink:0}
.av1{background:#fde8d8;color:#8b3a1a}.av2{background:#d8eede;color:#1a5e35}.av3{background:#dde4f5;color:#1a2f7a}.av4{background:#f5ddf5;color:#6b1a6b}
.match-info{flex:1}
.match-name{font-weight:500;font-size:0.9rem;margin-bottom:3px}
.match-skills{display:flex;gap:5px;flex-wrap:wrap}
.skill-pill{font-size:0.7rem;padding:2px 8px;border-radius:100px;font-weight:500}
.pill-offer{background:#d8eede;color:#1a5e35}.pill-want{background:#fde8d8;color:#8b3a1a}
.match-badge{font-size:0.7rem;background:var(--accent);color:white;padding:3px 8px;border-radius:6px;font-weight:600}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin:4rem 0 3rem}
.stat-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:1.4rem}
.stat-num{font-family:var(--font-display);font-size:2.2rem;font-weight:800;letter-spacing:-1px;line-height:1;margin-bottom:4px}
.stat-label{font-size:0.85rem;color:var(--ink3)}
.section-title{font-family:var(--font-display);font-size:1.8rem;font-weight:700;letter-spacing:-0.5px;margin-bottom:0.4rem}
.section-sub{font-size:0.95rem;color:var(--ink2);margin-bottom:2rem;font-weight:300}
.steps-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:4rem}
.step-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:1.4rem;position:relative;overflow:hidden}
.step-num{font-family:var(--font-display);font-size:3rem;font-weight:800;color:var(--bg2);position:absolute;top:-8px;right:10px;line-height:1;pointer-events:none}
.step-icon{font-size:1.4rem;margin-bottom:0.6rem}
.step-title{font-weight:600;font-size:0.9rem;margin-bottom:4px}
.step-desc{font-size:0.8rem;color:var(--ink2);line-height:1.5;font-weight:300}
.about-hero{margin-bottom:3rem}
.about-tag{display:inline-block;background:var(--accent2);color:white;font-size:0.72rem;font-weight:600;padding:4px 12px;border-radius:100px;margin-bottom:1rem;letter-spacing:0.07em;text-transform:uppercase}
.about-title{font-family:var(--font-display);font-size:clamp(2rem,4vw,3.2rem);font-weight:800;letter-spacing:-1px;line-height:1.1;margin-bottom:1rem;max-width:600px}
.about-intro{font-size:1.05rem;color:var(--ink2);line-height:1.75;max-width:580px;font-weight:300}
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin:2.5rem 0}
.about-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:1.5rem}
.about-card.accent-green{border-color:var(--accent2);background:#f2f9f5}
.about-card.accent-orange{border-color:var(--accent);background:#fff8f5}
.about-card-icon{font-size:1.6rem;margin-bottom:0.7rem}
.about-card-title{font-family:var(--font-display);font-size:1.1rem;font-weight:700;margin-bottom:0.5rem}
.about-card-text{font-size:0.88rem;color:var(--ink2);line-height:1.65;font-weight:300}
.values-section{margin:3rem 0}
.values-list{display:flex;flex-direction:column;gap:1px;border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;background:var(--border)}
.value-row{background:var(--card);padding:1.1rem 1.4rem;display:flex;gap:1rem}
.value-num{font-family:var(--font-display);font-size:0.75rem;font-weight:700;color:var(--ink3);min-width:24px;padding-top:2px}
.value-title{font-weight:600;font-size:0.92rem;margin-bottom:2px}
.value-text{font-size:0.83rem;color:var(--ink2);line-height:1.5;font-weight:300}
.builder-section{margin:3rem 0;background:var(--ink);border-radius:var(--radius);padding:2rem;color:var(--bg)}
.builder-title{font-family:var(--font-display);font-size:1.5rem;font-weight:700;margin-bottom:0.5rem;letter-spacing:-0.5px}
.builder-text{font-size:0.9rem;color:#a8a89e;line-height:1.7;font-weight:300;max-width:500px;margin-bottom:1.2rem}
.tech-pills{display:flex;flex-wrap:wrap;gap:8px}
.tech-pill{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#d8d4c8;font-size:0.78rem;padding:4px 12px;border-radius:100px}
.contact-layout{display:grid;grid-template-columns:1fr 1.4fr;gap:3rem;align-items:start}
.contact-title{font-family:var(--font-display);font-size:clamp(2rem,4vw,3rem);font-weight:800;letter-spacing:-1px;line-height:1.1;margin-bottom:1rem}
.contact-sub{font-size:0.95rem;color:var(--ink2);line-height:1.7;font-weight:300;margin-bottom:2rem}
.contact-info-list{display:flex;flex-direction:column;gap:12px}
.contact-info-item{display:flex;align-items:center;gap:10px;font-size:0.88rem;color:var(--ink2)}
.contact-icon{width:32px;height:32px;border-radius:8px;background:var(--bg2);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:0.85rem;flex-shrink:0}
.contact-form{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:2rem}
.form-title{font-family:var(--font-display);font-size:1.2rem;font-weight:700;margin-bottom:1.4rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.form-label{font-size:0.8rem;font-weight:500;color:var(--ink2);letter-spacing:0.02em}
.form-input,.form-textarea,.form-select{background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;font-family:var(--font-body);font-size:0.9rem;color:var(--ink);outline:none;transition:border-color 0.2s;width:100%}
.form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--ink)}
.form-input::placeholder,.form-textarea::placeholder{color:var(--ink3)}
.form-textarea{resize:vertical;min-height:100px}
.form-submit{width:100%;background:var(--ink);color:var(--bg);font-family:var(--font-body);font-size:0.95rem;font-weight:500;padding:13px;border-radius:10px;border:none;cursor:pointer;transition:all 0.2s;margin-top:4px}
.form-submit:hover{background:var(--accent)}
.success-msg{background:#f2f9f5;border:1.5px solid #2a6b4a;border-radius:10px;padding:12px 16px;font-size:0.88rem;color:#2a6b4a;margin-top:12px;display:none}
.success-msg.show{display:block}
.footer{border-top:1.5px solid var(--border);padding:1.5rem 2rem;text-align:center;font-size:0.8rem;color:var(--ink3);max-width:1100px;margin:0 auto}
@media(max-width:768px){.hero{grid-template-columns:1fr;gap:2rem;min-height:auto}.steps-grid{grid-template-columns:1fr 1fr}.stats-row{grid-template-columns:1fr}.about-grid{grid-template-columns:1fr}.contact-layout{grid-template-columns:1fr}.form-row{grid-template-columns:1fr}.navbar{padding:0 1rem}.page{padding:2rem 1rem 4rem}}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState } = React;

function Navbar({ page, setPage }) {
  return (
    <nav className="navbar">
      <div className="navbar-logo" onClick={() => setPage("home")}>
        <span className="logo-dot"></span>StackMate
      </div>
      <div className="navbar-links">
        {["home","about","contact"].map(p => (
          <button key={p} className={`nav-link ${page===p?"active":""}`} onClick={() => setPage(p)}>
            {p.charAt(0).toUpperCase()+p.slice(1)}
          </button>
        ))}
      </div>
    </nav>
  );
}

const matches = [
  { initials:"RK", av:"av1", name:"Riya K. — 2nd year CSE", offer:"Figma", want:"DSA", featured:true },
  { initials:"AM", av:"av2", name:"Arjun M. — 3rd year IT", offer:"DSA", want:"React" },
  { initials:"PS", av:"av3", name:"Priya S. — Final year", offer:"React", want:"ML basics" },
  { initials:"VT", av:"av4", name:"Vivek T. — 2nd year ECE", offer:"Python", want:"Figma" },
];

const steps = [
  { icon:"✉️", title:"Sign up with college email", desc:"Your .ac.in email auto-detects your college. No manual setup." },
  { icon:"🃏", title:"Post your skill swap", desc:"List what you can teach and what you want to learn." },
  { icon:"🤝", title:"Get matched", desc:"Mutual match only — both sides must want what the other offers." },
  { icon:"📅", title:"Schedule & swap", desc:"Pick a time, do the session, rate each other. That's it." },
];

function Home({ setPage }) {
  return (
    <main className="page">
      <section className="hero">
        <div className="hero-left">
          <div className="hero-tag">🎓 For college students only</div>
          <h1 className="hero-title">Trade skills,<br/>not <span>money</span></h1>
          <p className="hero-sub">Your campus is full of people who know what you don't — and need what you know. StackMate connects you anonymously for skill swaps. Zero cost, zero awkwardness.</p>
          <div className="hero-actions">
            <button className="btn-primary" onClick={() => setPage("contact")}>Join the waitlist →</button>
            <button className="btn-secondary" onClick={() => setPage("about")}>How it works</button>
          </div>
        </div>
        <div className="hero-right">
          {matches.map((m,i) => (
            <div key={i} className={`match-card ${m.featured?"featured":""}`}>
              <div className={`match-avatar ${m.av}`}>{m.initials}</div>
              <div className="match-info">
                <div className="match-name">{m.name}</div>
                <div className="match-skills">
                  <span className="skill-pill pill-offer">offers {m.offer}</span>
                  <span className="skill-pill pill-want">wants {m.want}</span>
                </div>
              </div>
              {m.featured && <div className="match-badge">matched!</div>}
            </div>
          ))}
        </div>
      </section>
      <section className="stats-row">
        <div className="stat-card"><div className="stat-num">0₹</div><div className="stat-label">Cost to use, ever</div></div>
        <div className="stat-card"><div className="stat-num">2-way</div><div className="stat-label">Mutual matches only</div></div>
        <div className="stat-card"><div className="stat-num">Auto</div><div className="stat-label">Any college, self-onboards</div></div>
      </section>
      <section>
        <h2 className="section-title">How it works</h2>
        <p className="section-sub">Four steps. No friction.</p>
        <div className="steps-grid">
          {steps.map((s,i) => (
            <div key={i} className="step-card">
              <div className="step-num">{i+1}</div>
              <div className="step-icon">{s.icon}</div>
              <div className="step-title">{s.title}</div>
              <div className="step-desc">{s.desc}</div>
            </div>
          ))}
        </div>
      </section>
    </main>
  );
}

const values = [
  { title:"Anonymous first", text:"Your name and photo stay hidden until both sides agree to connect. No cold rejections, no social pressure." },
  { title:"Campus-only trust", text:"StackMate only works within your college. You're swapping with people who share your campus, your syllabus, your pressures." },
  { title:"Equal exchange", text:"No one is doing a favour. Every match is mutual — you both need something the other has. That makes it feel fair." },
  { title:"No money, ever", text:"Skills are the currency here. We believe students shouldn't pay to learn from each other." },
];

const techStack = ["React","Node.js","Express","Supabase","PostgreSQL","Supabase Auth","Supabase Realtime","Vercel","Railway"];

function About() {
  return (
    <main className="page">
      <section className="about-hero">
        <div className="about-tag">About StackMate</div>
        <h1 className="about-title">Built because asking for help felt weird</h1>
        <p className="about-intro">StackMate started from a simple frustration — every college has students who are brilliant at something and struggling with something else. But there was no good way to connect them. Asking friends felt like owing a favour. Hiring tutors was expensive. So we built the thing in between.</p>
      </section>
      <div className="about-grid">
        <div className="about-card accent-orange">
          <div className="about-card-icon">🔥</div>
          <div className="about-card-title">The problem we're solving</div>
          <div className="about-card-text">Skills exist all over campus but stay invisible. The person who can explain DSA in simple Hindi is two floors above you. The Figma wizard who'd trade for some Python help is in the next hostel block. StackMate makes that visible — safely and anonymously.</div>
        </div>
        <div className="about-card accent-green">
          <div className="about-card-icon">💡</div>
          <div className="about-card-title">Why it works differently</div>
          <div className="about-card-text">When you sign up with your college email, you're automatically placed in your college's private community. IIT Delhi students only see IIT Delhi students. VIT students only see VIT students. One platform, many invisible walls — like Discord servers but for your campus.</div>
        </div>
      </div>
      <section className="values-section">
        <h2 className="section-title">What we believe</h2>
        <p className="section-sub">The principles behind every design decision.</p>
        <div className="values-list">
          {values.map((v,i) => (
            <div key={i} className="value-row">
              <div className="value-num">0{i+1}</div>
              <div>
                <div className="value-title">{v.title}</div>
                <div className="value-text">{v.text}</div>
              </div>
            </div>
          ))}
        </div>
      </section>
      <section className="builder-section">
        <div className="builder-title">Built by a student, for students</div>
        <p className="builder-text">This is a fullstack project built with a completely free stack. No funding, no team, no startup pitch. Just a real problem and a working solution. The multi-tenant architecture means any college in India can use it the moment their first student signs up — no manual onboarding needed.</p>
        <div className="tech-pills">
          {techStack.map(t => <span key={t} className="tech-pill">{t}</span>)}
        </div>
      </section>
    </main>
  );
}

function Contact() {
  const [submitted, setSubmitted] = useState(false);
  const [form, setForm] = useState({ name:"", email:"", college:"", role:"", message:"" });
  const handleChange = e => setForm({...form, [e.target.name]: e.target.value});
  const handleSubmit = e => {
    e.preventDefault();
    if (!form.name || !form.email) return;
    setSubmitted(true);
    setTimeout(() => setSubmitted(false), 4000);
    setForm({ name:"", email:"", college:"", role:"", message:"" });
  };
  return (
    <main className="page">
      <div className="contact-layout">
        <div className="contact-left">
          <h1 className="contact-title">Let's get you on the list</h1>
          <p className="contact-sub">StackMate is in early development. If you're a student who'd actually use this — or wants to help build it — drop your details. We'll reach out when your college goes live.</p>
          <div className="contact-info-list">
            <div className="contact-info-item"><div className="contact-icon">📬</div><span>hello@stackmate.in (coming soon)</span></div>
            <div className="contact-info-item"><div className="contact-icon">🏫</div><span>Available for any Indian college with a .ac.in domain</span></div>
            <div className="contact-info-item"><div className="contact-icon">🛠️</div><span>Looking for early testers and contributors</span></div>
            <div className="contact-info-item"><div className="contact-icon">⚡</div><span>Built solo — response might take a day or two</span></div>
          </div>
        </div>
        <div className="contact-form">
          <div className="form-title">Join the waitlist</div>
          <form onSubmit={handleSubmit}>
            <div className="form-row">
              <div className="form-group">
                <label className="form-label">Your name</label>
                <input className="form-input" type="text" name="name" placeholder="Arjun Mehta" value={form.name} onChange={handleChange} required/>
              </div>
              <div className="form-group">
                <label className="form-label">College email</label>
                <input className="form-input" type="email" name="email" placeholder="you@college.ac.in" value={form.email} onChange={handleChange} required/>
              </div>
            </div>
            <div className="form-row">
              <div className="form-group">
                <label className="form-label">College name</label>
                <input className="form-input" type="text" name="college" placeholder="VIT Vellore" value={form.college} onChange={handleChange}/>
              </div>
              <div className="form-group">
                <label className="form-label">I am a...</label>
                <select className="form-select" name="role" value={form.role} onChange={handleChange}>
                  <option value="">Select one</option>
                  <option value="student">Student (want to use it)</option>
                  <option value="developer">Student dev (want to contribute)</option>
                  <option value="other">Other</option>
                </select>
              </div>
            </div>
            <div className="form-group">
              <label className="form-label">What skill would you swap? (optional)</label>
              <textarea className="form-textarea" name="message" placeholder="e.g. I'd offer DSA help in exchange for someone teaching me Figma..." value={form.message} onChange={handleChange}/>
            </div>
            <button type="submit" className="form-submit">Join waitlist →</button>
            <div className={`success-msg ${submitted?"show":""}`}>You're on the list! We'll reach out when your college goes live 🎉</div>
          </form>
        </div>
      </div>
    </main>
  );
}

function App() {
  const [page, setPage] = useState("home");
  return (
    <div>
      <Navbar page={page} setPage={setPage}/>
      {page==="home" && <Home setPage={setPage}/>}
      {page==="about" && <About/>}
      {page==="contact" && <Contact/>}
      <div className="footer">made with love by a student, for students · StackMate 2025</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
